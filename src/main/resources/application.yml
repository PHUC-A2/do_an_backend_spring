# Conversion to YAML from Properties formar report
# Warnings:
# - The yaml file had comments which are lost in the refactoring!
spring:
  application:
    name: backend
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: jdbc:mysql://localhost:3306/doan
    username: root
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    web:
      pageable:
        one-indexed-parameters: true
        # Khớp query FE (Pitch client + admin): ?page=1&pageSize=10
        size-parameter: pageSize
backend:
  jwt:
    base64-secret: ${JWT_SECRET}
    access-token-validity-in-second: 604800
    refresh-token-validity-in-second: 604800
  upload-file:
    base-uri: ${UPLOAD_DIR}
server:
  address: 0.0.0.0
  port: 8080
  # Đứng sau nginx/HTTPS: nhận X-Forwarded-* để redirect/cookie đúng (một lần cấu hình server)
  forward-headers-strategy: framework
admin:
  email: ${ADMIN_EMAIL}
  name: ${ADMIN_NAME}
  password: ${ADMIN_PASSWORD}

ai:
  groq:
    api-key: ${GROQ_API_KEY:}
    base-url: ${GROQ_BASE_URL:https://api.groq.com/openai}
    model: ${GROQ_MODEL:llama-3.3-70b-versatile}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
  cloudflare:
    api-token: ${CLOUDFLARE_API_TOKEN:}
    account-id: ${CLOUDFLARE_ACCOUNT_ID:}
    model: ${CLOUDFLARE_MODEL:@cf/meta/llama-3-8b-instruct}
  chat:
    max-off-topic-per-day: 15
    max-on-topic-per-day: 100
    # Chống spam: tin quá ngắn / lặp lại cùng nội dung (không gọi LLM)
    min-message-length: 3
    duplicate-user-message-window: 12
    duplicate-user-message-min-repeats: 2